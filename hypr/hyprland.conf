
# --- CONFIGURAÇÃO HYPRLAND ---

# 1. AMBIENTE NVIDIA (Crítico para sua MX150 não dar tela preta)
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,drm-nvidia-gpu
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
cursor {
    no_hardware_cursors = true
}
# --- PALETAS CORES ---
$bg_dark     = rgb(1b212c)
$fg_text     = rgb(ccd6e3)
$neon_pink   = rgb(ff007f)
$neon_orange = rgb(f6bb78)
$muted_teal  = rgb(446a71)
$car_red     = rgb(7f323e)

# ACIONADOR DE PLACA HIBRIDA

# No topo do arquivo
env = WLR_DRM_NO_ATOMIC,1
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0

# Na seção 'general'
general {
    allow_tearing = false
}


# 2. MONITORES (Auto detect)
monitor=,preferred,auto,1

# 3. AUTOSTART (Igual ao seu i3)
exec-once = waybar
exec-once = hyprpaper &  # Ou o swww que você preferir
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = fcitx5 -d # Se usar para emojis/acentos

# 4. INPUT (ABNT2 Corrigido)
input {
    kb_layout = br
    kb_variant = abnt2
    kb_model = 
    kb_options =
    
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
}

# 5. VISUAL (Baseado no seu estilo Dracula/Purple)
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 4

    # Gradiente bonitão entre o rosa néon e o laranja dos postes
    col.active_border = $muted_teal 45deg
    
    # Borda inativa discreta (azul escuro dos prédios)
    col.inactive_border = rgba(1b212caa)

    layout = dwindle
}

decoration {
    rounding = 10
    
    # Sombra para dar profundidade (estilo néon)
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1b212cee)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        # Isso dá aquele efeito de "vidro molhado" nas janelas transparentes
        ignore_opacity = true
    }
}

# 6. KEYBINDS
$mainMod = SUPER

bind = $mainMod, Return, exec, kitty
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, D, exec, ~/.config/rofi/launchers/type-7/launcher.sh
bind = $mainMod, F, fullscreen, 
bind = $mainMod SHIFT, space, togglefloating, 

# Apps Rápidos
bind = $mainMod, N, exec, firefox
bind = $mainMod, B, exec, thunar

# Navegação
bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r

# Mover Janelas
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, rigt, movewindow, r

# Workspaces (1-10)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover para Workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
# ... adicione os outros conforme necessário

# Áudio e Brilho (XF86 Keys)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Screenshot (Wayland usa grim/slurp, mas se quiser usar flameshot:)
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -

# Menu de desligar (Se você instalou o wlogout nos dotfiles)
bind = $mainMod SHIFT, X, exec, ~/.config/hypr/powermenu.sh
